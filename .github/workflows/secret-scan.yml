name: Secret Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets and PII
        run: |
          echo "=== Scanning for secrets and PII ==="
          FOUND=0

          # Azure subscription IDs
          if grep -rn '[0-9a-f]\{8\}-[0-9a-f]\{4\}-[0-9a-f]\{4\}-[0-9a-f]\{4\}-[0-9a-f]\{12\}' --include='*.sh' --include='*.py' --include='*.json' --include='*.md' --include='*.yml' --include='*.yaml' --include='*.env' . | grep -iv 'example\|placeholder\|template\|00000000'; then
            echo "::error::Possible subscription ID or GUID found"
            FOUND=1
          fi

          # API keys / tokens (generic patterns)
          if grep -rn 'sk-[a-zA-Z0-9]\{20,\}\|xoxb-\|xapp-\|ghp_\|ghs_\|glpat-' --include='*.sh' --include='*.py' --include='*.json' --include='*.md' --include='*.yml' --include='*.yaml' --include='*.env' . ; then
            echo "::error::Possible API key or token found"
            FOUND=1
          fi

          # Passwords in plaintext
          if grep -rn 'password\s*=\s*["\x27][^${\x27"]\+["\x27]' --include='*.sh' --include='*.py' --include='*.json' --include='*.env' . | grep -iv 'example\|placeholder\|template\|YOUR_'; then
            echo "::error::Possible plaintext password found"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Secret scan failed. Remove secrets before pushing."
            exit 1
          fi

          echo "Secret scan passed."
